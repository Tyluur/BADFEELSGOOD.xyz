
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BADFEELSGOOD</title>
  <meta name="description" content="BADFEELSGOOD — dark music from toronto.">
  <meta property="og:title" content="BADFEELSGOOD">
  <meta property="og:description" content="dark music from toronto.">
  <meta property="og:url" content="https://badfeelsgood.xyz">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000000;
      --white: #f0ece4;
      --grey: #2a2a2a;
      --dim: #888880;
      --accent: #c8c0b0;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
      animation: grain 0.4s steps(1) infinite;
    }

    @keyframes grain {
      0%   { background-position: 0 0; }
      25%  { background-position: -64px 32px; }
      50%  { background-position: 32px -64px; }
      75%  { background-position: -32px 64px; }
      100% { background-position: 64px -32px; }
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 99;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    }

    /* Layout */
    .site {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
    }

    /* Mask SVG */
    .mask-wrap {
      width: 160px;
      height: 160px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      position: relative;
    }

    .mask-wrap::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,192,176,0.06) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.08); }
    }

    .mask-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(200,192,176,0.12));
    }

    /* Name */
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 10vw, 80px);
      letter-spacing: 0.12em;
      color: var(--white);
      text-align: center;
      line-height: 1;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: lowercase;
      margin-top: 12px;
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      max-width: 320px;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border: 1px solid #1a1a1a;
      text-decoration: none;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.01);
    }

    .link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: rgba(200,192,176,0.04);
      transition: width 0.3s ease;
    }

    .link:hover::before {
      width: 100%;
    }

    .link:hover {
      border-color: #333;
      color: var(--white);
      letter-spacing: 0.3em;
    }

    .link-arrow {
      font-size: 14px;
      opacity: 0.4;
      transition: all 0.3s ease;
    }

    .link:hover .link-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* Divider */
    .divider {
      width: 100%;
      max-width: 320px;
      height: 1px;
      background: #111;
      margin: 4px 0;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.3em;
      color: #333;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .mask-wrap { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <main class="site">

    <div class="mask-wrap">
      <img src="avatar.png" alt="BADFEELSGOOD" />
    </div>

    <h1 class="name">BADFEELSGOOD</h1>
    <p class="tagline">dark music &nbsp;·&nbsp; toronto</p>

    <nav class="links">
      <a class="link" href="https://open.spotify.com/artist/" target="_blank" rel="noopener">
        Spotify <span class="link-arrow">↗</span>
      </a>
      <a class="link" href="https://soundcloud.com/BADFEELSGOOD" target="_blank" rel="noopener">
        SoundCloud <span class="link-arrow">↗</span>
      </a>
      <div class="divider"></div>
      <a class="link" href="https://www.tiktok.com/@_badfeelsgood" target="_blank" rel="noopener">
        TikTok <span class="link-arrow">↗</span>
      </a>
      <a class="link" href="https://www.instagram.com/_badfeelsgood" target="_blank" rel="noopener">
        Instagram <span class="link-arrow">↗</span>
      </a>
    </nav>

  </main>

  <footer class="footer">© badfeelsgood — all rights reserved</footer>

</body>
</html>
